<section id="certificados" class="px-4 py-14 sm:px-6 sm:py-20 lg:px-8">
    <div class="mx-auto max-w-7xl">
        <div class="mb-10 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between" data-aos="fade-up">
            <div class="max-w-2xl">
                <p class="text-sm font-semibold uppercase tracking-[0.35em] text-sky-300">Certificados</p>
                <h2 class="mt-3 text-3xl font-bold text-white sm:text-4xl">Formação contínua com apresentação mais premium e organizada.</h2>
            </div>
            
        </div>

        <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
            {% for cert in certificados %}
            <article class="group rounded-[2rem] border border-white/10 bg-white/5 p-6 backdrop-blur-sm transition duration-300 hover:-translate-y-2 hover:border-sky-400/30 hover:bg-sky-400/10 hover:shadow-neon"
                     data-aos="flip-left">
                <div class="mb-5 flex items-start justify-between gap-4">
                    <h3 class="text-lg font-bold text-white">
                        {{ cert.nome }}
                    </h3>
                    <span class="rounded-full border border-sky-400/25 bg-sky-400/10 px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.25em] text-sky-200">
                        Certificação
                    </span>
                </div>

                <p class="text-sm text-slate-300">
                    {{ cert.instituicao }}
                </p>

                <p class="mt-2 text-sm text-slate-500">
                    {{ cert.data }}
                </p>

                {% if cert.link %}
                <a href="{{ cert.link }}" target="_blank" rel="noopener noreferrer"
                   class="mt-6 inline-flex items-center gap-2 text-sm font-semibold text-sky-300 transition hover:text-sky-200">
                    Ver certificado
                    <span class="transition duration-300 group-hover:translate-x-1">→</span>
                </a>
                {% endif %}
            </article>
            {% empty %}
            <div class="col-span-full rounded-[2rem] border border-dashed border-white/15 bg-white/5 px-6 py-12 text-center text-slate-400">
                Nenhum certificado cadastrado ainda.
            </div>
            {% endfor %}
        </div>
    </div>
</section>
