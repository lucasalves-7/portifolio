<section id="futuros" class="px-4 py-14 sm:px-6 sm:py-20 lg:px-8">
    <div class="mx-auto max-w-7xl rounded-[2.25rem] border border-white/10 bg-slate-950/60 px-5 py-8 shadow-neon backdrop-blur-sm sm:px-8 sm:py-10">
        <div class="mb-10 max-w-3xl" data-aos="fade-up">
            <p class="text-sm font-semibold uppercase tracking-[0.35em] text-violet-300">Projetos Futuros</p>
            <h2 class="mt-3 text-3xl font-bold text-white sm:text-4xl">Ideias em planejamento para ampliar escopo, complexidade e impacto.</h2>
        </div>

        <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
            {% for projeto in futuros %}
            <article class="group rounded-[2rem] border border-dashed border-violet-400/25 bg-white/5 p-6 transition duration-300 hover:-translate-y-2 hover:border-violet-300/45 hover:bg-violet-400/10"
                     data-aos="fade-up">
                <div class="mb-4 inline-flex rounded-full border border-violet-400/20 bg-violet-400/10 px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.25em] text-violet-200">
                    Em planejamento
                </div>

                <h3 class="text-xl font-bold text-white">
                    {{ projeto.nome }}
                </h3>

                <p class="mt-4 text-sm leading-7 text-slate-400">
                    {{ projeto.descricao }}
                </p>
            </article>
            {% empty %}
            <div class="col-span-full rounded-[2rem] border border-dashed border-white/15 bg-white/5 px-6 py-12 text-center text-slate-400">
                Nenhuma ideia cadastrada ainda.
            </div>
            {% endfor %}
        </div>
    </div>
</section>
